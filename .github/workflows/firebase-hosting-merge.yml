# Deploys Hosting on every push to main. All deployment identity — which
# Firebase project, its web config, the emergency contact shown in the app —
# lives in the GitHub Environment "Musubi" (Settings > Environments), never
# in this repo. The repo is the engine; the Environment says where it runs.
# Secrets expected in the Environment:
#   FIREBASE_CONFIG          Firebase web config as strict JSON (quoted keys)
#   FIREBASE_PROJECT_ID      the Firebase project id
#   FIREBASE_SERVICE_ACCOUNT service account JSON for the deploy action
#   EMERGENCY_CONTACT_NAME / EMERGENCY_CONTACT_EMAIL / EMERGENCY_CONTACT_PHONE
#     shown in the app's emergency footer (optional — placeholder if unset)
# Secrets are used (not vars) so values are masked in public Actions logs.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: Musubi
    steps:
      - uses: actions/checkout@v4
      # Refuse to ship a build carrying the emulator-only demo config: fail
      # loudly instead of silently deploying a bundle that connects nowhere.
      - name: Ensure deployment identity is configured
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          missing=""
          [ -z "$FIREBASE_CONFIG" ] && missing="$missing FIREBASE_CONFIG"
          [ -z "$FIREBASE_PROJECT_ID" ] && missing="$missing FIREBASE_PROJECT_ID"
          [ -z "$FIREBASE_SERVICE_ACCOUNT" ] && missing="$missing FIREBASE_SERVICE_ACCOUNT"
          if [ -n "$missing" ]; then
            echo "::error::Environment 'Musubi' is missing secrets:$missing — see the header of this workflow file."
            exit 1
          fi
      - run: npm ci && npm run build
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          VITE_EMERGENCY_CONTACT_NAME: ${{ secrets.EMERGENCY_CONTACT_NAME }}
          VITE_EMERGENCY_CONTACT_EMAIL: ${{ secrets.EMERGENCY_CONTACT_EMAIL }}
          VITE_EMERGENCY_CONTACT_PHONE: ${{ secrets.EMERGENCY_CONTACT_PHONE }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
      # Firestore rules are deployed manually, not from CI. After changing
      # firestore.rules: firebase deploy --only firestore:rules --project <id>
